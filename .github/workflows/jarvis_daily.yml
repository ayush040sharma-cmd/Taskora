name: Jarvis Daily Security & QA Audit

on:
  # Daily at 03:00 UTC
  schedule:
    - cron: "0 3 * * *"

  # Allow manual triggers from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no files changed, no PRs opened)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write        # create branches + commits
  pull-requests: write   # open PRs
  issues: write          # create escalation issues

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Unit tests for the agent itself
  # ────────────────────────────────────────────────────────────────────────────
  test-agent:
    name: Agent unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-agent

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ai-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-json-report

      - name: Run firewall unit tests
        env:
          ANTHROPIC_API_KEY: "dummy-for-tests"
        run: |
          pytest firewall/tests/test_firewall.py -v \
            --json-report --json-report-file=/tmp/firewall_test_report.json \
            --tb=short

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firewall-test-report
          path: /tmp/firewall_test_report.json

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Full orchestrator cycle
  # ────────────────────────────────────────────────────────────────────────────
  audit-cycle:
    name: Jarvis Audit Cycle
    runs-on: ubuntu-latest
    needs: test-agent
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history for accurate diff
          fetch-depth: 0
          token: ${{ secrets.JARVIS_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ai-agent/requirements.txt

      - name: Set up Node.js (for npm audit + JS linting)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        working-directory: ai-agent
        run: pip install -r requirements.txt

      - name: Install frontend deps (for npm audit)
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Configure git identity for auto-fix commits
        run: |
          git config user.name  "Jarvis Bot"
          git config user.email "jarvis-bot@taskora.dev"

      - name: Run Jarvis audit cycle
        working-directory: ai-agent
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:         ${{ secrets.JARVIS_GITHUB_TOKEN }}
          JARVIS_GITHUB_OWNER:  ${{ github.repository_owner }}
          JARVIS_GITHUB_REPO:   ${{ github.event.repository.name }}
          DRY_RUN:              ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python scripts/run_cycle.py \
            $( [ "$DRY_RUN" = "true" ] && echo "--dry-run" ) \
            --json > /tmp/cycle_result.json
          cat /tmp/cycle_result.json

      - name: Upload cycle result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-cycle-result
          path: /tmp/cycle_result.json
          retention-days: 30

      - name: Post summary to job
        if: always()
        run: |
          python - <<'PY'
          import json, os
          try:
              data = json.load(open("/tmp/cycle_result.json"))
              s    = data.get("summary", {})
              sec  = s.get("security", {})
              qual = s.get("quality", {})
              act  = s.get("actions", {})
              lines = [
                "## 🤖 Jarvis Audit Summary",
                "",
                f"**State:** `{data.get('state', '?')}`  |  **Cycle:** `{data.get('cycle_id', '?')}`",
                "",
                "| Metric | Value |",
                "|--------|-------|",
                f"| Security Risk Score | {sec.get('risk_score','?')}/100 |",
                f"| Critical / High | {sec.get('critical',0)} / {sec.get('high',0)} |",
                f"| Quality Score | {qual.get('score','?')}/100 |",
                f"| Tests Passed | {qual.get('tests_passed',0)}/{qual.get('tests_total',0)} |",
                f"| Auto-fixed | {act.get('auto_fixed',0)} |",
                f"| Escalated | {act.get('escalated',0)} |",
                f"| PR Opened | {'✅' if act.get('pr_opened') else '—'} |",
              ]
              print("\n".join(lines))
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write("\n".join(lines) + "\n")
          except Exception as e:
              print(f"Could not parse cycle result: {e}")
          PY

      - name: Fail job if cycle state is FAILED
        run: |
          python - <<'PY'
          import json, sys
          try:
              data = json.load(open("/tmp/cycle_result.json"))
              if data.get("state") == "failed":
                  print(f"Cycle failed: {data.get('error', 'unknown error')}")
                  sys.exit(1)
          except Exception as e:
              print(f"Result parse error: {e}")
              sys.exit(1)
          PY
